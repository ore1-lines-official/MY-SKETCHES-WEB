
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ore1.lines | Official.Art-Web</title>

<link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">

<style>

:root{
--pink:#ff7eb9;
--blue:#7afcff;
--purple:#b388ff;
--cyan:#64ffda;
--dark:#050508;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Outfit',sans-serif;
background:linear-gradient(120deg,#050508,#0b0b18,#050508);
color:white;
overflow-x:hidden;
}

/* animated background */

body::before{
content:"";
position:fixed;
width:200%;
height:200%;

background:
radial-gradient(circle at 20% 30%,rgba(255,126,185,0.15),transparent 40%),
radial-gradient(circle at 80% 70%,rgba(122,252,255,0.15),transparent 40%),
radial-gradient(circle at 50% 10%,rgba(179,136,255,0.15),transparent 40%),
radial-gradient(circle at 60% 80%,rgba(100,255,218,0.15),transparent 40%);

animation:bgmove 18s linear infinite;

z-index:-1;
}

@keyframes bgmove{
0%{transform:translate(0,0)}
50%{transform:translate(-10%,-8%)}
100%{transform:translate(0,0)}
}

/* header */

header{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

header h1{
font-family:'Syncopate';
font-size:clamp(3rem,13vw,8rem);

background:linear-gradient(
90deg,
var(--pink),
var(--blue),
var(--purple),
var(--cyan),
var(--pink)
);

background-size:400%;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:gradientFlow 7s linear infinite;
}

@keyframes gradientFlow{
to{background-position:400%}
}

header p{
font-family:'Playfair Display';
letter-spacing:8px;
color:var(--cyan);
margin-top:10px;
}

/* gallery */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:40px;
padding:80px 6%;
max-width:1500px;
margin:auto;
}

/* colorful frames */

.art-frame{

position:relative;

padding:12px;

background:
linear-gradient(
135deg,
var(--pink),
var(--blue),
var(--purple)
);

border-radius:16px;

box-shadow:
0 10px 40px rgba(0,0,0,0.8),
0 0 20px rgba(122,252,255,0.2);

transition:all .45s cubic-bezier(.17,.67,.25,1.25);

cursor:pointer;

overflow:hidden;

opacity:0;
transform:translateY(40px);
}

.art-frame.show{
opacity:1;
transform:translateY(0);
}

.art-frame::before{
content:"";
position:absolute;
inset:6px;
background:#0a0a10;
border-radius:12px;
}

.art-frame img{
position:relative;
width:100%;
height:auto;
display:block;
border-radius:8px;
z-index:2;
transition:transform .5s ease;
}

.art-frame:hover{
transform:translateY(-12px) scale(1.04);

box-shadow:
0 25px 80px rgba(0,0,0,0.9),
0 0 40px rgba(122,252,255,0.6);
}

.art-frame:hover img{
transform:scale(1.05);
}

/* lightbox */

#lightbox{
position:fixed;
inset:0;
background:rgba(0,0,0,0.95);
display:none;
justify-content:center;
align-items:center;
z-index:999;
backdrop-filter:blur(12px);
}

#lightbox img{
max-width:90%;
max-height:90%;
border-radius:10px;
animation:zoom .4s ease;
}

@keyframes zoom{
from{transform:scale(.8);opacity:0}
to{transform:scale(1);opacity:1}
}

/* footer */

.footer{
text-align:center;
padding:120px 0;
}

/* animated follow button */

.follow-btn{

font-family:'Syncopate';

padding:18px 60px;

text-decoration:none;

color:white;

border-radius:40px;

background:linear-gradient(
90deg,
var(--pink),
var(--blue),
var(--purple),
var(--cyan),
var(--pink)
);

background-size:300%;

animation:followGradient 6s linear infinite;

transition:.35s;

display:inline-block;

position:relative;

overflow:hidden;

}

@keyframes followGradient{
0%{background-position:0%}
100%{background-position:300%}
}

.follow-btn:hover{

transform:scale(1.12);

box-shadow:
0 0 20px var(--pink),
0 0 40px var(--blue),
0 0 70px var(--purple);

}

.follow-btn::after{

content:"";

position:absolute;

top:0;
left:-100%;

width:100%;
height:100%;

background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,0.5),
transparent
);

transition:0.6s;

}

.follow-btn:hover::after{

left:120%;

}

</style>

</head>

<body>

<header>
<h1>ORE1.LINES</h1>
<h2>VISHNU | ARTIST</h2>
<p>ANIME ARTS & SKETCHES</p>
</header>

<section class="gallery">

<div class="art-frame"><img src="Kanao.jpg"></div>
<div class="art-frame"><img src="Hana1.jpg"></div>
<div class="art-frame"><img src="Hana.jpg"></div>
<div class="art-frame"><img src="Gojo.jpg"></div>
<div class="art-frame"><img src="Chizuru.jpg"></div>
<div class="art-frame"><img src="Chivsruka.jpg"></div>
<div class="art-frame"><img src="Fanart.jpg"></div>
<div class="art-frame"><img src="Hina.jpg"></div>
<div class="art-frame"><img src="jinwoo.jpg"></div>
<div class="art-frame"><img src="Ruka1.jpg"></div>
<div class="art-frame"><img src="Chinatsu.jpg"></div>
<div class="art-frame"><img src="Sukuna.jpg"></div>
<div class="art-frame"><img src="Rainy.jpg"></div>

</section>

<div class="footer">

<a href="https://www.instagram.com/ore1.lines/" 
class="follow-btn"
target="_blank">

FOLLOW ON INSTAGRAM

</a>

</div>

<div id="lightbox">
<img id="lightbox-img">
</div>

<script>

const frames=document.querySelectorAll(".art-frame")

const observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add("show")
}
})
},{threshold:0.2})

frames.forEach(frame=>{

observer.observe(frame)

frame.onclick=()=>{
document.getElementById("lightbox").style.display="flex"
document.getElementById("lightbox-img").src=
frame.querySelector("img").src
}

})

document.getElementById("lightbox").onclick=()=>{
document.getElementById("lightbox").style.display="none"
}

</script>

</body>

</html>
