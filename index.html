<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ore1.lines | Official.Art.Web</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">

    <style>
        :root {
            --pink: #ff7eb9;
            --blue: #7afcff;
            --purple: #b388ff;
            --cyan: #64ffda;
            --dark: #050508;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(120deg, #050508, #0b0b18, #050508);
            color: white;
            overflow-x: hidden;
        }

        /* animated background */
        body::before {
            content: "";
            position: fixed;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255, 126, 185, 0.15), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(122, 252, 255, 0.15), transparent 40%),
                radial-gradient(circle at 50% 10%, rgba(179, 136, 255, 0.15), transparent 40%),
                radial-gradient(circle at 60% 80%, rgba(100, 255, 218, 0.15), transparent 40%);
            animation: bgmove 18s linear infinite;
            z-index: -1;
        }

        @keyframes bgmove {
            0% { transform: translate(0, 0); }
            50% { transform: translate(-10%, -8%); }
            100% { transform: translate(0, 0); }
        }

        /* header */
        header {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        header h1 {
            font-family: 'Syncopate';
            font-size: clamp(3rem, 13vw, 8rem);
            background: linear-gradient(90deg, var(--pink), var(--blue), var(--purple), var(--cyan), var(--pink));
            background-size: 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientFlow 7s linear infinite;
        }

        @keyframes gradientFlow {
            to { background-position: 400%; }
        }

        header p {
            font-family: 'Playfair Display';
            letter-spacing: 8px;
            color: var(--cyan);
            margin-top: 10px;
        }

        /* Fixed Masonry Gallery Arrangement */
        .gallery-wrapper {
            padding: 40px 6%;
            max-width: 1500px;
            margin: auto;
        }

        .gallery {
            /* This creates the Pinterest-style columns */
            column-count: 3; 
            column-gap: 30px;
        }

        /* Adjust columns for mobile/tablet */
        @media (max-width: 1000px) {
            .gallery { column-count: 2; }
        }
        @media (max-width: 600px) {
            .gallery { column-count: 1; }
        }

        .art-frame {
            break-inside: avoid; /* Prevents images from splitting between columns */
            margin-bottom: 30px; /* This creates the even vertical gap */
            position: relative;
            padding: 12px;
            background: linear-gradient(135deg, var(--pink), var(--blue), var(--purple));
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            transition: all .45s cubic-bezier(.17,.67,.25,1.25);
            cursor: pointer;
            overflow: hidden;
            opacity: 0;
            transform: translateY(40px);
            display: inline-block; /* Essential for masonry */
            width: 100%;
        }

        .art-frame.show {
            opacity: 1;
            transform: translateY(0);
        }

        .art-frame::before {
            content: "";
            position: absolute;
            inset: 6px;
            background: #0a0a10;
            border-radius: 12px;
        }

        .art-frame img {
            position: relative;
            width: 100%;
            height: auto;
            display: block; 
            border-radius: 8px;
            z-index: 2;
            transition: transform .5s ease;
        }

        .art-frame:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 50px rgba(122,252,255,0.3);
        }

        /* lightbox */
        #lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
            backdrop-filter: blur(12px);
        }

        #lightbox img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
            animation: zoom .4s ease;
        }

        @keyframes zoom {
            from { transform: scale(.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* footer */
        .footer {
            text-align: center;
            padding: 100px 0;
        }

        .follow-btn {
            font-family: 'Syncopate';
            padding: 18px 60px;
            text-decoration: none;
            color: white;
            border-radius: 40px;
            background: linear-gradient(90deg, var(--pink), var(--blue), var(--purple), var(--cyan), var(--pink));
            background-size: 300%;
            animation: followGradient 6s linear infinite;
            transition: .35s;
            display: inline-block;
            position: relative;
            overflow: hidden;
            border: none;
            cursor: pointer;
        }

        @keyframes followGradient {
            0% { background-position: 0%; }
            100% { background-position: 300%; }
        }

        .follow-btn:hover {
            transform: scale(1.12);
            box-shadow: 0 0 20px var(--pink), 0 0 40px var(--blue);
        }
    </style>
</head>
<body>

    <header>
        <h1>ORE1.LINES</h1>
        <h2>VISHNU | TRADITIONAL ARTIST</h2>
        <p>ANIME ART & SKETCHES</p>
    </header>

    <div class="gallery-wrapper">
        <section class="gallery">
            <div class="art-frame"><img src="Kanao.jpg"></div>
            <div class="art-frame"><img src="Hana1.jpg"></div>
            <div class="art-frame"><img src="Hana.jpg"></div>
            <div class="art-frame"><img src="Gojo.jpg"></div>
            <div class="art-frame"><img src="Chizuru.jpg"></div>
            <div class="art-frame"><img src="Chivsruka.jpg"></div>
            <div class="art-frame"><img src="Fanart.jpg"></div>
            <div class="art-frame"><img src="Hina.jpg"></div>
            <div class="art-frame"><img src="jinwoo.jpg"></div>
            <div class="art-frame"><img src="Ruka1.jpg"></div>
            <div class="art-frame"><img src="Chinatsu.jpg"></div>
            <div class="art-frame"><img src="Sukuna.jpg"></div>
            <div class="art-frame"><img src="Rainy.jpg"></div>
            <div class="art-frame"><img src="FUGA.jpg"></div>
            <div class="art-frame"><img src="SUBARU.jpg"></div>
            <div class="art-frame"><img src="FUGA1.jpg"></div>
        </section>
    </div>

    <div class="footer">
        <a href="https://www.instagram.com/ore1.lines/" class="follow-btn" id="instagram-link">
            FOLLOW @ORE1.LINES
        </a>
    </div>

    <div id="lightbox">
        <img id="lightbox-img">
    </div>

    <script>
        // Gallery Animation
        const frames = document.querySelectorAll(".art-frame");
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if(entry.isIntersecting){
                    entry.target.classList.add("show");
                }
            });
        }, { threshold: 0.1 });

        frames.forEach(frame => {
            observer.observe(frame);
            frame.onclick = () => {
                document.getElementById("lightbox").style.display = "flex";
                document.getElementById("lightbox-img").src = frame.querySelector("img").src;
            }
        });

        document.getElementById("lightbox").onclick = () => {
            document.getElementById("lightbox").style.display = "none";
        }

        // Instagram App Deep Link
        const igLink = document.getElementById('instagram-link');
        igLink.onclick = function(e) {
            e.preventDefault();
            window.location.href = "instagram://user?username=ore1.lines";
            setTimeout(() => {
                window.open("https://www.instagram.com/ore1.lines/", "_blank");
            }, 500);
        };
    </script>
</body>
</html>
