<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ore1.lines | Art-Web Page</title>

<link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">

<style>

:root{
--pink:#ff7eb9;
--blue:#7afcff;
--gold:#ffd86b;
--dark:#040406;
--card:rgba(255,255,255,0.05);
--transition:all .6s cubic-bezier(.16,1,.3,1);
}

html{scroll-behavior:smooth;}

body{
margin:0;
font-family:'Outfit',sans-serif;
background:var(--dark);
color:white;
overflow-x:hidden;
}

/* Animated Aurora Background */

.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 30%, rgba(255,126,185,.15), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(122,252,255,.15), transparent 40%),
radial-gradient(circle at 60% 10%, rgba(255,216,107,.12), transparent 40%);
z-index:-1;
animation:bgMove 14s infinite alternate ease-in-out;
}

@keyframes bgMove{
0%{transform:scale(1)}
100%{transform:scale(1.2)}
}

/* Header */

header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

/* Animated Gradient Title */

header h1{
font-family:'Syncopate';
font-size:clamp(3rem,14vw,9rem);
letter-spacing:-5px;
margin:0;

background:linear-gradient(
90deg,
#ff7eb9,
#7afcff,
#ffd86b,
#ff7eb9
);

background-size:300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:titleFlow 6s linear infinite;
}

@keyframes titleFlow{
0%{background-position:0%}
100%{background-position:300%}
}

.subtitle{
font-family:'Playfair Display';
font-style:italic;
letter-spacing:6px;
color:var(--blue);
}

/* Gallery */

.gallery{
max-width:1700px;
margin:auto;
padding:120px 6%;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:60px;
}

/* Frames */

.art-frame{
background:var(--card);
padding:18px;
border:1px solid rgba(255,255,255,.1);
backdrop-filter:blur(12px);
transition:var(--transition);
position:relative;
cursor:pointer;

opacity:0;
transform:translateY(60px) scale(.9) rotate(var(--tilt));
animation:float 6s ease-in-out infinite;
}

/* tilt variations */

.art-frame:nth-child(odd){--tilt:-2deg;}
.art-frame:nth-child(even){--tilt:2deg;}
.art-frame:nth-child(3n){--tilt:-3deg;}

.art-frame.reveal{
opacity:1;
transform:translateY(0) scale(1) rotate(var(--tilt));
}

/* floating motion */

@keyframes float{
0%{transform:translateY(0) rotate(var(--tilt))}
50%{transform:translateY(-8px) rotate(var(--tilt))}
100%{transform:translateY(0) rotate(var(--tilt))}
}

.art-frame img{
width:100%;
display:block;
filter:grayscale(20%);
transition:var(--transition);
}

/* Hover effects */

.art-frame:hover{
transform:scale(1.05) rotate(0deg) translateY(-10px);

box-shadow:
0 20px 60px rgba(0,0,0,.7),
0 0 25px #ff7eb9,
0 0 35px #7afcff,
0 0 45px #ffd86b;

background:rgba(255,255,255,.08);
}

.art-frame:hover img{
filter:grayscale(0%) contrast(110%) saturate(120%);
transform:scale(1.05);
}

/* Color corner borders */

.art-frame::before,
.art-frame::after{
content:"";
position:absolute;
width:40px;
height:40px;
border-style:solid;
border-width:3px;
border-image:linear-gradient(45deg,#ff7eb9,#7afcff,#ffd86b) 1;
transition:.5s;
}

.art-frame::before{
top:0;
left:0;
border-width:3px 0 0 3px;
}

.art-frame::after{
bottom:0;
right:0;
border-width:0 3px 3px 0;
}

.art-frame:hover::before,
.art-frame:hover::after{
width:100%;
height:100%;
}

/* Lightbox */

#lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
backdrop-filter:blur(20px);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

#lightbox img{
max-width:90%;
max-height:85%;
border:10px solid white;
box-shadow:0 0 80px black;
animation:zoom .4s ease;
}

@keyframes zoom{
from{transform:scale(.8);opacity:0}
to{transform:scale(1);opacity:1}
}

/* Instagram button */

.follow{
display:inline-block;
padding:18px 50px;
font-family:'Syncopate';
letter-spacing:2px;
border:1px solid rgba(255,255,255,.2);
color:white;
text-decoration:none;
position:relative;
overflow:hidden;
transition:.4s;
animation:pulse 3s infinite;
}

.follow:hover{
color:black;
border-color:var(--blue);
}

.follow::before{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:var(--blue);
transition:.4s;
z-index:-1;
}

.follow:hover::before{
left:0;
}

@keyframes pulse{
0%{box-shadow:0 0 10px #ff7eb9}
50%{box-shadow:0 0 25px #7afcff}
100%{box-shadow:0 0 10px #ff7eb9}
}

.footer{
text-align:center;
padding-bottom:120px;
}

</style>
</head>

<body>

<div class="bg"></div>

<header>

<h1>ORE1.LINES</h1>
<div class="subtitle">Anime Art & Sketches</div>
<p style="letter-spacing:2px;font-weight:300;margin-top:20px;">VISHNU | ARTIST </p>

</header>

<div class="gallery">

<div class="art-frame"><img src="Kanao.jpg"></div>
<div class="art-frame"><img src="Hana1.jpg"></div>
<div class="art-frame"><img src="Hana.jpg"></div>
<div class="art-frame"><img src="Gojo.jpg"></div>
<div class="art-frame"><img src="Chizuru.jpg"></div>
<div class="art-frame"><img src="Chivsruka.jpg"></div>
<div class="art-frame"><img src="Fanart.jpg"></div>
<div class="art-frame"><img src="Hina.jpg"></div>
<div class="art-frame"><img src="jinwoo.jpg"></div>
<div class="art-frame"><img src="Ruka1.jpg"></div>
<div class="art-frame"><img src="Chinatsu.jpg"></div>
<div class="art-frame"><img src="Sukuna.jpg"></div>
<div class="art-frame"><img src="Rainy.jpg"></div>

</div>

<div class="footer">
<a href="https://www.instagram.com/ore1.lines/" class="follow">FOLLOW ON INSTAGRAM</a>
</div>

<div id="lightbox">
<img id="full">
</div>

<script>

const observer=new IntersectionObserver(entries=>{
entries.forEach((entry,i)=>{
if(entry.isIntersecting){
setTimeout(()=>{
entry.target.classList.add("reveal")
},i*80)
}
})
},{threshold:.15})

document.querySelectorAll(".art-frame").forEach(frame=>{
observer.observe(frame)

frame.onclick=()=>{
const img=frame.querySelector("img").src
document.getElementById("lightbox").style.display="flex"
document.getElementById("full").src=img
}
})

document.getElementById("lightbox").onclick=()=>{
document.getElementById("lightbox").style.display="none"
}

</script>

</body>
</html>
